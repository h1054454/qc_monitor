name: Update status page

on:
  schedule:
    # 06:00 UTC = 08:00 Vienna (CET+2 in summer)
    - cron: "0 6 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Generate status.html
        run: python scripts/generate_status.py

      - name: Commit and push status.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/status.html
          git diff --cached --quiet || git commit -m "chore: update status.html [skip ci]"
          git push
