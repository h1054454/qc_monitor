name: Market Monitor - weekday alert

# Sends the daily macro early-warning email + Telegram message.
# Runs in GitHub's cloud, so it no longer depends on the laptop being awake.

on:
  schedule:
    # 06:00 UTC = 08:00 Vienna (summer) / 07:00 Vienna (winter). Mon-Fri only.
    - cron: "0 6 * * 1-5"
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # lets the job push status.html + indicator history

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Restore credentials + subscriber list from secrets
        run: |
          mkdir -p config
          cat > config/monitor_config.json << 'EOF'
          ${{ secrets.MONITOR_CONFIG }}
          EOF
          cat > config/known_subscribers.json << 'EOF'
          ${{ secrets.KNOWN_SUBSCRIBERS }}
          EOF

      - name: Run market monitor
        run: python scripts/market_monitor.py

      - name: Commit status page + indicator history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/status.html data/indicator_history.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: daily monitor update [skip ci]"
          git push
